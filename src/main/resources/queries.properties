profissional.getAll=SELECT profissional_id As id, nome, crefito_ou_registro AS crefitoOuRegistro, telefone FROM fisio.profissional ORDER BY nome ASC
profissional.create=INSERT INTO fisio.profissional (nome, crefito_ou_registro, telefone) VALUES (:nome, :crefitoOuRegistro, :telefone)
