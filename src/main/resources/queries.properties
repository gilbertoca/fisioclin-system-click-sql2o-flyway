profissional.get=SELECT profissional_id As id, nome, crefito_ou_registro AS crefitoOuRegistro, telefone FROM profissional WHERE profissional_id = :id
profissional.getAll=SELECT profissional_id As id, nome, crefito_ou_registro AS crefitoOuRegistro, telefone FROM profissional ORDER BY nome ASC
profissional.create=INSERT INTO profissional (nome, crefito_ou_registro, telefone) VALUES (:nome, :crefitoOuRegistro, :telefone)
profissional.update=UPDATE profissional SET nome = :nome, crefito_ou_registro = :crefitoOuRegistro, telefone = :telefone WHERE profissional_id = :id
profissional.delete=DELETE FROM profissional WHERE profisional_id = :id
profissional.getAllLikeNome=SELECT profissional_id, nome, crefito_ou_registro AS crefitoOuRegistro, telefone FROM profissional WHERE LOWER(nome) LIKE LOWER(:nome) ORDER BY nome ASC

# ============================================================================
# MODALIDADE (SERVICE) CRUD
# ============================================================================
modalidade.get=SELECT modalidade_id As id, nome, duracao_minutos AS duracaoMinutos, valor_base AS valorBase FROM modalidade WHERE modalidade_id = :id
modalidade.getAll=SELECT modalidade_id As id, nome, duracao_minutos AS duracaoMinutos, valor_base AS valorBase FROM modalidade ORDER BY nome ASC
modalidade.create=INSERT INTO modalidade (nome, duracao_minutos, valor_base) VALUES (:nome, :duracaoMinutos, :valorBase)
modalidade.update=UPDATE modalidade SET nome = :nome, duracao_minutos = :duracaoMinutos, valor_base = :valorBase WHERE modalidade_id = :id
modalidade.delete=DELETE FROM modalidade WHERE modalidade_id = :id
modalidade.getAllLikeNome=SELECT modalidade_id As id, nome, duracao_minutos AS duracaoMinutos, valor_base AS valorBase FROM modalidade WHERE LOWER(nome) LIKE LOWER(:nome) ORDER BY nome ASC

# ============================================================================
# SESSAO (APPOINTMENT) CRUD & VALIDATIONS
# ============================================================================
sessao.verificarConflitoHorario=\
    SELECT COUNT(*) FROM sessao \
    WHERE profissional_id = :idProfissional \
      AND status_sessao IN ('AGENDADA', 'CONFIRMADA', 'EM_ANDAMENTO') \
      AND (:dataHoraInicio < data_hora_fim AND :dataHoraFim > data_hora_inicio)

sessao.get=\
    SELECT s.sessao_id AS id, s.data_hora_inicio AS dataHoraInicio, s.data_hora_fim AS dataHoraFim, \
           s.status_sessao AS statusSessao, s.tipo_sessao AS tipoSessao, s.tipo_pagamento AS tipoPagamento, \
           s.observacoes_recepcao AS observacoesRecepcao, \
           c.cliente_id AS \"cliente.id\", c.nome AS \"cliente.nome\", c.cpf AS \"cliente.cpf\", \
           conv.convenio_id AS \"cliente.convenio.id\", conv.nome AS \"cliente.convenio.nome\", \
           p.profissional_id AS \"profissional.id\", p.nome AS \"profissional.nome\", \
           m.modalidade_id AS \"modalidade.id\", m.nome AS \"modalidade.nome\" \
    FROM sessao s \
    JOIN cliente c ON s.cliente_id = c.cliente_id \
    LEFT JOIN convenio conv ON c.convenio_id = conv.convenio_id \
    JOIN profissional p ON s.profissional_id = p._profissional_id \
    JOIN modalidade m ON s.modalidade_id = m.modalidade_id \
    WHERE s.sessao_id = :id

sessao.findGridAgenda=\
    SELECT s.sessao_id AS id, s.data_hora_inicio AS dataHoraInicio, s.data_hora_fim AS dataHoraFim, \
           s.status_sessao AS statusSessao, s.tipo_sessao AS tipoSessao, s.tipo_pagamento AS tipoPagamento, \
           s.observacoes_recepcao AS observacoesRecepcao, \
           c.cliente_id AS \"cliente.id\", c.nome AS \"cliente.nome\", c.cpf AS \"cliente.cpf\", \
           conv.convenio_id AS \"cliente.convenio.id\", conv.nome AS \"cliente.convenio.nome\", \
           p.profissional_id AS \"profissional.id\", p.nome AS \"profissional.nome\", \
           m.modalidade_id AS \"modalidade.id\", m.nome AS \"modalidade.nome\" \
    FROM sessao s \
    JOIN cliente c ON s.cliente_id = c.cliente_id \
    LEFT JOIN convenio conv ON c.convenio_id = conv.convenio_id \
    JOIN profissional p ON s.profissional_id = p.profissional_id \
    JOIN modalidade m ON s.modalidade_id = m.modalidade_id \
    WHERE CAST(s.data_hora_inicio AS DATE) = :dataFiltro \
    ORDER BY s.data_hora_inicio ASC

sessao.insert=\
    INSERT INTO sessao (cliente_id, profissional_id, modalidade_id, data_hora_inicio, data_hora_fim, tipo_sessao, tipo_pagamento, status_sessao, observacoes_recepcao) \
    VALUES (:clienteId, :profissionalId, :modalidadeId, :dataHoraInicio, :dataHoraFim, :tipoSessao, :tipoPagamento, :statusSessao, :observacoesRecepcao)

sessao.update=\
    UPDATE sessao SET cliente_id = :cliente.id, profissional_id = :profissional.id, modalidade_id = :modalidade.id, \
                      data_hora_inicio = :dataHoraInicio, data_hora_fim = :dataHoraFim, tipo_sessao = :tipoSessao, \
                      tipo_pagamento = :tipoPagamento, status_sessao = :statusSessao, observacoes_recepcao = :observacoesRecepcao \
    WHERE sessao_id = :id

sessao.delete=DELETE FROM sessao WHERE sessao_id = :id
