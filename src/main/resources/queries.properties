# ============================================================================
# CLIENT MODULE QUERIES
# ============================================================================

cliente.findAllWithConvenio=\
    SELECT c.id AS id, \
           c.nome AS nome, \
           c.cpf AS cpf, \
           c.status_clinico AS statusClinico, \
           conv.id AS \"convenio.id\", \
           conv.nome AS \"convenio.nome\" \
    FROM cliente c \
    LEFT JOIN convenio conv ON c.id_convenio = conv.id \
    ORDER BY c.nome ASC

# ============================================================================
# SESSION MODULE QUERIES
# ============================================================================

sessao.insert=\
    INSERT INTO sessao (id_cliente, id_profissional, id_modalidade, data_hora_inicio, data_hora_fim, tipo_sessao, tipo_pagamento, status_sessao, observacoes_recepcao) \
    VALUES (:idCliente, :idProfissional, :idModalidade, :dataHoraInicio, :dataHoraFim, :tipoSessao, :tipoPagamento, :statusSessao, :observacoesRecepcao)

sessao.findGridAgenda=\
    SELECT s.id AS id, \
           s.data_hora_inicio AS dataHoraInicio, \
           s.data_hora_fim AS dataHoraFim, \
           s.status_sessao AS statusSessao, \
           s.tipo_sessao AS tipoSessao, \
           s.tipo_pagamento AS tipoPagamento, \
           c.id AS \"cliente.id\", \
           c.nome AS \"cliente.nome\", \
           c.cpf AS \"cliente.cpf\", \
           conv.id AS \"cliente.convenio.id\", \
           conv.nome AS \"cliente.convenio.nome\", \
           p.id AS \"profissional.id\", \
           p.nome AS \"profissional.nome\", \
           m.id AS \"modalidade.id\", \
           m.nome AS \"modalidade.nome\" \
    FROM sessao s \
    JOIN cliente c ON s.id_cliente = c.id \
    LEFT JOIN convenio conv ON c.id_convenio = conv.id \
    JOIN profissional p ON s.id_profissional = p.id \
    JOIN modalidade m ON s.id_modalidade = m.id \
    WHERE s.data_hora_inicio = :dataFiltro \
    ORDER BY s.data_hora_inicio ASC
# ============================================================================
# BILLING TRANSACTION QUERIES
# ============================================================================

billing.insertFaturamento=\
    INSERT INTO faturamento (id_cliente, tipo_faturamento, id_convenio, valor_total_faturado, data_emissao, status_faturamento, observacoes) \
    VALUES (:idCliente, :tipoFaturamento, :idConvenio, :valorTotalFaturado, :dataEmissao, :statusFaturamento, :observacoes)

billing.insertItem=\
    INSERT INTO faturamento_item (id_faturamento, id_sessao, valor_item) \
    VALUES (:idFaturamento, :idSessao, :valorItem)

# O parâmetro agora aponta para o grafo do objeto: :faturamento.id
billing.insertParcela=\
    INSERT INTO recebimento_parcela (id_faturamento, numero_parcela, valor_parcela, data_vencimento, status_pagamento, data_pagamento, forma_pagamento) \
    VALUES (:idFaturamento, :numeroParcela, :valorParcela, :dataVencimento, :statusPagamento, :dataPagamento, :formaPagamento)

# Query do Cockpit Financeiro usando dot-notation para reconstruir o Faturamento de dentro da Parcela
billing.findParcelasDoDia=\
    SELECT rp.id AS id, \
           rp.numero_parcela AS numeroParcela, \
           rp.valor_parcela AS valorParcela, \
           rp.data_vencimento AS dataVencimento, \
           rp.status_pagamento AS statusPagamento, \
           f.id AS \"faturamento.id\", \
           f.tipo_faturamento AS \"faturamento.tipoFaturamento\", \
           f.status_faturamento AS \"faturamento.statusFaturamento\" \
    FROM recebimento_parcela rp \
    JOIN faturamento f ON rp.id_faturamento = f.id \
    WHERE rp.data_vencimento = :dataFiltro \
    ORDER BY rp.id ASC
