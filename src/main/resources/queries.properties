# ============================================================================
# SESSAO (APPOINTMENT) CRUD & VALIDATIONS
# ============================================================================
sessao.verificarConflitoHorario=\
    SELECT COUNT(*) FROM fisio.sessao \
    WHERE profissional_id = :profissionalId \
      AND sessao_status IN ('AGENDADA', 'CONFIRMADA', 'EM_ANDAMENTO') \
      AND (:dataHoraInicio < data_hora_fim AND :dataHoraFim > data_hora_inicio)

sessao.get=\
    SELECT s.sessao_id AS id, s.data_hora_inicio AS dataHoraInicio, s.data_hora_fim AS dataHoraFim, \
           s.sessao_status AS sessaoStatus, s.sessao_tipo AS sessaoTipo, s.pagamento_origem AS pagamentoOrigem, \
           s.observacoes_recepcao AS observacoesRecepcao, \
           c.cliente_id AS \"cliente.id\", c.nome AS \"cliente.nome\", c.cpf AS \"cliente.cpf\", \
           conv.convenio_id AS \"cliente.convenio.id\", conv.nome AS \"cliente.convenio.nome\", \
           p.profissional_id AS \"profissional.id\", p.nome AS \"profissional.nome\", \
           m.modalidade_id AS \"modalidade.id\", m.nome AS \"modalidade.nome\" \
    FROM fisio.sessao s \
    JOIN fisio.cliente c ON s.cliente_id = c.cliente_id \
    LEFT JOIN fisio.convenio conv ON c.convenio_id = conv.convenio_id \
    JOIN fisio.profissional p ON s.profissional_id = p._profissional_id \
    JOIN fisio.modalidade m ON s.modalidade_id = m.modalidade_id \
    WHERE s.sessao_id = :id

sessao.findGridAgenda=\
    SELECT s.sessao_id AS id, s.data_hora_inicio AS dataHoraInicio, s.data_hora_fim AS dataHoraFim, \
           s.sessao_status AS sessaoStatus, s.sessao_tipo AS sessaoTipo, s.pagamento_origem AS pagamentoOrigem, \
           s.observacoes_recepcao AS observacoesRecepcao, \
           c.cliente_id AS \"cliente.id\", c.nome AS \"cliente.nome\", c.cpf AS \"cliente.cpf\", \
           conv.convenio_id AS \"cliente.convenio.id\", conv.nome AS \"cliente.convenio.nome\", \
           p.profissional_id AS \"profissional.id\", p.nome AS \"profissional.nome\", \
           m.modalidade_id AS \"modalidade.id\", m.nome AS \"modalidade.nome\" \
    FROM fisio.sessao s \
    JOIN fisio.cliente c ON s.cliente_id = c.cliente_id \
    LEFT JOIN fisio.convenio conv ON c.convenio_id = conv.convenio_id \
    JOIN fisio.profissional p ON s.profissional_id = p.profissional_id \
    JOIN fisio.modalidade m ON s.modalidade_id = m.modalidade_id \
    WHERE CAST(s.data_hora_inicio AS DATE) = :dataFiltro \
    ORDER BY s.data_hora_inicio ASC

sessao.create=\
    INSERT INTO fisio.sessao (cliente_id, profissional_id, modalidade_id, data_hora_inicio, data_hora_fim, sessao_tipo, pagamento_origem, sessao_status, observacoes_recepcao) \
    VALUES (:clienteId, :profissionalId, :modalidadeId, :dataHoraInicio, :dataHoraFim, :sessaoTipo, :pagamentoOrigem, :sessaoStatus, :observacoesRecepcao)

sessao.update=\
    UPDATE fisio.sessao SET cliente_id = :cliente.id, profissional_id = :profissional.id, modalidade_id = :modalidade.id, \
                      data_hora_inicio = :dataHoraInicio, data_hora_fim = :dataHoraFim, sessao_tipo = :sessaoTipo, \
                      pagamento_origem = :pagamentoOrigem, sessao_status = :sessaoStatus, observacoes_recepcao = :observacoesRecepcao \
    WHERE sessao_id = :id

sessao.delete=DELETE FROM sessao WHERE sessao_id = :id
# ============================================================================
# FATURAMENTO (BILLING MODULE) CRUD - SUFIXO OPERACIONAL
# ============================================================================

# Mapeamento do get que monta a raiz e prepara as propriedades para o Grafo Rico
faturamento.get=\
    SELECT f.faturamento_id AS id, f.pagamento_origem AS pagamentoOrigem, f.valor_total_faturado AS valorTotalFaturado, \
           f.data_emissao AS dataEmissao, f.faturamento_status AS faturamentoStatus, f.observacoes AS observacoes, \
           c.cliente_id AS \"cliente.id\", c.nome AS \"cliente.nome\" \
    FROM fisio.faturamento f \
    JOIN fisio.cliente c ON f.cliente_id = c.cliente_id \
    WHERE f.faturamento_id = :id

# Listagem central do Cockpit Financeiro
faturamento.getAll=\
    SELECT f.faturamento_id AS id, f.pagamento_origem AS pagamentoOrigem, f.valor_total_faturado AS valorTotalFaturado, \
           f.data_emissao AS dataEmissao, f.faturamento_status AS faturamentoStatus, f.observacoes AS observacoes, \
           c.cliente_id AS \"cliente.id\", c.nome AS \"cliente.nome\" \
    FROM fisio.faturamento f \
    JOIN fisio.cliente c ON f.cliente_id = c.cliente_id \
    ORDER BY f.data_emissao DESC

# Nota de Escrita: O bind l\u00ea 'pagamentoOrigem', 'valorTotalFaturado', 'dataEmissao', 'faturamentoStatus', 'observacoes'.
# O ID do cliente \u00e9 mapeado de forma expl\u00edcita caso n\u00e3o use interceptores planos na raiz da entidade.
faturamento.create=\
    INSERT INTO fisio.faturamento (cliente_id, pagamento_origem, convenio_id, valor_total_faturado, data_emissao, faturamento_status, observacoes) \
    VALUES (:clienteId, :pagamentoOrigem, :convenioId, :valorTotalFaturado, :dataEmissao, :faturamentoStatus, :observacoes)

faturamento.update=\
    UPDATE fisio.faturamento SET faturamento_status = :faturamentoStatus, observacoes = :observacoes \
    WHERE faturamento_id = :id

faturamento.delete=\
    DELETE FROM fisio.faturamento WHERE faturamento_id = :id

faturamento.getAllLikeFaturamentoStatus=\
    SELECT f.faturamento_id AS id, f.pagamento_origem AS pagamentoOrigem, f.valor_total_faturado AS valorTotalFaturado, \
           f.data_emissao AS dataEmissao, f.faturamento_status AS faturamentoStatus, f.observacoes AS observacoes, \
           c.cliente_id AS \"cliente.id\", c.nome AS \"cliente.nome\" \
    FROM fisio.faturamento f \
    JOIN fisio.cliente c ON f.cliente_id = c.cliente_id \
    WHERE LOWER(f.faturamento_status) LIKE LOWER(:faturamentoStatus) \
    ORDER BY f.data_emissao DESC

