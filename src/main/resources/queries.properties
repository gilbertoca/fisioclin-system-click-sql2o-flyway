    VALUES (:idFaturamento, :idSessao, :valorItem)

# Inser\u00e7\u00e3o direta de parcelas vinculadas ao caixa. O bind l\u00ea propriedades planas como 'numeroParcela', etc.
recebimento_parcela.create=\
    INSERT INTO recebimento_parcela (faturamento_id, numero_parcela, valor_parcela, data_vencimento, status_pagamento, data_pagamento, pagamento_meio) \
    VALUES (:idFaturamento, :numeroParcela, :valorParcela, :dataVencimento, :pagamentoStatus, :dataPagamento, :pagamentoMeio)
