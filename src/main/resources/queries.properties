profissional.delete=DELETE FROM fisio.profissional WHERE profisional_id = :id
profissional.getAllLikeNome=SELECT profissional_id, nome, crefito_ou_registro AS crefitoOuRegistro, telefone FROM fisio.profissional WHERE LOWER(nome) LIKE LOWER(:nome) ORDER BY nome ASC

# ============================================================================
