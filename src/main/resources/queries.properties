# ============================================================================
# CONVENIO (INSURANCE) CRUD
# ============================================================================
convenio.get=SELECT id, nome, cnpj FROM convenio WHERE id = :id
convenio.getAll=SELECT id, nome, cnpj FROM convenio ORDER BY nome ASC
convenio.create=INSERT INTO convenio (nome, cnpj) VALUES (:nome, :cnpj)
convenio.update=UPDATE convenio SET nome = :nome, cnpj = :cnpj WHERE id = :id
convenio.delete=DELETE FROM convenio WHERE id = :id
convenio.getAllLikeNome=SELECT id, nome, cnpj FROM convenio WHERE LOWER(nome) LIKE LOWER(:nome) ORDER BY nome ASC

# ============================================================================
# CLIENTE (PATIENT) CRUD
# ============================================================================
cliente.get=\
    SELECT c.id AS id, c.nome AS nome, c.cpf AS cpf, c.data_nascimento AS dataNascimento, \
           c.telefone AS telefone, c.status_clinico AS statusClinico, \
           conv.id AS \"convenio.id\", conv.nome AS \"convenio.nome\" \
    FROM cliente c \
    LEFT JOIN convenio conv ON c.id_convenio = conv.id \
    WHERE c.id = :id

cliente.getAll=\
    SELECT c.id AS id, c.nome AS nome, c.cpf AS cpf, c.data_nascimento AS dataNascimento, \
           c.telefone AS telefone, c.status_clinico AS statusClinico, \
           conv.id AS \"convenio.id\", conv.nome AS \"convenio.nome\" \
    FROM cliente c \
    LEFT JOIN convenio conv ON c.id_convenio = conv.id \
    ORDER BY c.nome ASC

cliente.create=\
    INSERT INTO cliente (nome, cpf, data_nascimento, telefone, id_convenio, status_clinico) \
    VALUES (:nome, :cpf, :dataNascimento, :telefone, :convenio.id, :statusClinico)

cliente.update=\
    UPDATE cliente SET nome = :nome, cpf = :cpf, data_nascimento = :dataNascimento, \
                       telefone = :telefone, id_convenio = :convenio.id, status_clinico = :statusClinico \
    WHERE id = :id

cliente.delete=DELETE FROM cliente WHERE id = :id

cliente.getAllLikeNome=\
    SELECT c.id AS id, c.nome AS nome, c.cpf AS cpf, c.data_nascimento AS dataNascimento, \
           c.telefone AS telefone, c.status_clinico AS statusClinico, \
           conv.id AS \"convenio.id\", conv.nome AS \"convenio.nome\" \
    FROM cliente c \
    LEFT JOIN convenio conv ON c.id_convenio = conv.id \
    WHERE LOWER(c.nome) LIKE LOWER(:nome) \
    ORDER BY c.nome ASC

# ============================================================================
# PROFISSIONAL (THERAPIST) CRUD
# ============================================================================
profissional.get=SELECT id, nome, crefito_ou_registro AS crefitoOuRegistro, telefone FROM profissional WHERE id = :id
profissional.getAll=SELECT id, nome, crefito_ou_registro AS crefitoOuRegistro, telefone FROM profissional ORDER BY nome ASC
profissional.create=INSERT INTO profissional (nome, crefito_ou_registro, telefone) VALUES (:nome, :crefitoOuRegistro, :telefone)
profissional.update=UPDATE profissional SET nome = :nome, crefito_ou_registro = :crefitoOuRegistro, telefone = :telefone WHERE id = :id
profissional.delete=DELETE FROM profissional WHERE id = :id
profissional.getAllLikeNome=SELECT id, nome, crefito_ou_registro AS crefitoOuRegistro, telefone FROM profissional WHERE LOWER(nome) LIKE LOWER(:nome) ORDER BY nome ASC

# ============================================================================
# MODALIDADE (SERVICE) CRUD
# ============================================================================
modalidade.get=SELECT id, nome, duracao_minutos AS duracaoMinutos, valor_base AS valorBase FROM modalidade WHERE id = :id
modalidade.getAll=SELECT id, nome, duracao_minutos AS duracaoMinutos, valor_base AS valorBase FROM modalidade ORDER BY nome ASC
modalidade.create=INSERT INTO modalidade (nome, duracao_minutos, valor_base) VALUES (:nome, :duracaoMinutos, :valorBase)
modalidade.update=UPDATE modalidade SET nome = :nome, duracao_minutos = :duracaoMinutos, valor_base = :valorBase WHERE id = :id
modalidade.delete=DELETE FROM modalidade WHERE id = :id
modalidade.getAllLikeNome=SELECT id, nome, duracao_minutos AS duracaoMinutos, valor_base AS valorBase FROM modalidade WHERE LOWER(nome) LIKE LOWER(:nome) ORDER BY nome ASC

# ============================================================================
# SESSAO (APPOINTMENT) CRUD & VALIDATIONS
# ============================================================================
sessao.verificarConflitoHorario=\
    SELECT COUNT(*) FROM sessao \
    WHERE id_profissional = :idProfissional \
      AND status_sessao IN ('AGENDADA', 'CONFIRMADA', 'EM_ANDAMENTO') \
      AND (:dataHoraInicio < data_hora_fim AND :dataHoraFim > data_hora_inicio)

sessao.get=\
    SELECT s.id AS id, s.data_hora_inicio AS dataHoraInicio, s.data_hora_fim AS dataHoraFim, \
           s.status_sessao AS statusSessao, s.tipo_sessao AS tipoSessao, s.tipo_pagamento AS tipoPagamento, \
           s.observacoes_recepcao AS observacoesRecepcao, \
           c.id AS \"cliente.id\", c.nome AS \"cliente.nome\", c.cpf AS \"cliente.cpf\", \
           conv.id AS \"cliente.convenio.id\", conv.nome AS \"cliente.convenio.nome\", \
           p.id AS \"profissional.id\", p.nome AS \"profissional.nome\", \
           m.id AS \"modalidade.id\", m.nome AS \"modalidade.nome\" \
    FROM sessao s \
    JOIN cliente c ON s.id_cliente = c.id \
    LEFT JOIN convenio conv ON c.id_convenio = conv.id \
    JOIN profissional p ON s.id_profissional = p.id \
    JOIN modalidade m ON s.id_modalidade = m.id \
    WHERE s.id = :id

sessao.findGridAgenda=\
    SELECT s.id AS id, s.data_hora_inicio AS dataHoraInicio, s.data_hora_fim AS dataHoraFim, \
           s.status_sessao AS statusSessao, s.tipo_sessao AS tipoSessao, s.tipo_pagamento AS tipoPagamento, \
           s.observacoes_recepcao AS observacoesRecepcao, \
           c.id AS \"cliente.id\", c.nome AS \"cliente.nome\", c.cpf AS \"cliente.cpf\", \
           conv.id AS \"cliente.convenio.id\", conv.nome AS \"cliente.convenio.nome\", \
           p.id AS \"profissional.id\", p.nome AS \"profissional.nome\", \
           m.id AS \"modalidade.id\", m.nome AS \"modalidade.nome\" \
    FROM sessao s \
    JOIN cliente c ON s.id_cliente = c.id \
    LEFT JOIN convenio conv ON c.id_convenio = conv.id \
    JOIN profissional p ON s.id_profissional = p.id \
    JOIN modalidade m ON s.id_modalidade = m.id \
    WHERE CAST(s.data_hora_inicio AS DATE) = :dataFiltro \
    ORDER BY s.data_hora_inicio ASC

sessao.insert=\
    INSERT INTO sessao (id_cliente, id_profissional, id_modalidade, data_hora_inicio, data_hora_fim, tipo_sessao, tipo_pagamento, status_sessao, observacoes_recepcao) \
    VALUES (:cliente.id, :profissional.id, :modalidade.id, :dataHoraInicio, :dataHoraFim, :tipoSessao, :tipoPagamento, :statusSessao, :observacoesRecepcao)

sessao.update=\
    UPDATE sessao SET id_cliente = :cliente.id, id_profissional = :profissional.id, id_modalidade = :modalidade.id, \
                      data_hora_inicio = :dataHoraInicio, data_hora_fim = :dataHoraFim, tipo_sessao = :tipoSessao, \
                      tipo_pagamento = :tipoPagamento, status_sessao = :statusSessao, observacoes_recepcao = :observacoesRecepcao \
    WHERE id = :id

sessao.delete=DELETE FROM sessao WHERE id = :id
