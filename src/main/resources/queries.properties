# ============================================================================
# CONVENIO (INSURANCE) CRUD
# ============================================================================
convenio.get=SELECT convenio_id As id, nome, cnpj FROM fisio.convenio WHERE convenio_id = :id
convenio.getAll=SELECT convenio_id As id, nome, cnpj FROM fisio.convenio ORDER BY nome ASC
convenio.create=INSERT INTO fisio.convenio (nome, cnpj) VALUES (:nome, :cnpj)
convenio.update=UPDATE fisio.convenio SET nome = :nome, cnpj = :cnpj WHERE convenio_id = :id
convenio.delete=DELETE FROM fisio.convenio WHERE convenio_id = :id
convenio.getAllLikeNome=SELECT convenio_id As id, nome, cnpj FROM fisio.convenio WHERE LOWER(nome) LIKE LOWER(:nome) ORDER BY nome ASC

# ============================================================================
# CLIENTE (PATIENT) CRUD
# ============================================================================
cliente.get=\
    SELECT c.cliente_id AS id, c.nome AS nome, c.cpf AS cpf, c.data_nascimento AS dataNascimento, \
           c.telefone AS telefone, c.status_clinico AS statusClinico, \
           conv.convenio_id AS \"convenio.id\", conv.nome AS \"convenio.nome\" \
    FROM fisio.cliente c \
    LEFT JOIN fisio.convenio conv ON c.convenio_id = conv.convenio_id \
    WHERE c.cliente_id = :id

cliente.getAll=\
    SELECT c.cliente_id AS id, c.nome AS nome, c.cpf AS cpf, c.data_nascimento AS dataNascimento, \
           c.telefone AS telefone, c.status_clinico AS statusClinico, \
           conv.convenio_id AS \"convenio.id\", conv.nome AS \"convenio.nome\" \
    FROM fisio.cliente c \
    LEFT JOIN fisio.convenio conv ON c.convenio_id = conv.convenio_id \
    ORDER BY c.nome ASC

cliente.create=\
    INSERT INTO fisio.cliente (nome, cpf, data_nascimento, telefone, convenio_id, status_clinico) \
    VALUES (:nome, :cpf, :dataNascimento, :telefone, :convenioId, :statusClinico)

cliente.update=\
    UPDATE fisio.cliente SET nome = :nome, cpf = :cpf, data_nascimento = :dataNascimento, \
                       telefone = :telefone, convenio_id = :convenioId, status_clinico = :statusClinico \
    WHERE cliente_id = :id

cliente.delete=DELETE FROM fisio.cliente WHERE cliente_id = :id

cliente.getAllLikeNome=\
    SELECT c.cliente_id AS id, c.nome AS nome, c.cpf AS cpf, c.data_nascimento AS dataNascimento, \
           c.telefone AS telefone, c.status_clinico AS statusClinico, \
           conv.convenio_id AS \"convenio.id\", conv.nome AS \"convenio.nome\" \
    FROM fisio.cliente c \
    LEFT JOIN fisio.convenio conv ON c.convenio_id = conv.convenio_id \
    WHERE LOWER(c.nome) LIKE LOWER(:nome) \
    ORDER BY c.nome ASC

