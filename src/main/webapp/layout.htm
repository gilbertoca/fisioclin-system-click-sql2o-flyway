<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CliniFisio - Sistema Integrado</title>
    
    <!-- Imports nativos de folha de estilo dos componentes do Click (Essencial para o DateField) -->
    $cssImports
</head>
<body style="font-family: sans-serif; padding: 20px;">

    <!-- Renderização Automática e Limpa da Árvore do Menu Configurado -->
    <div id="navigation-bar" style="margin-bottom: 30px; border-bottom: 1px solid #ccc; padding-bottom: 10px;">
        $rootMenu
    </div>

    <!-- Container Centralizador das Sub-telas Operacionais -->
    <div id="main-content">
        #parse($path)
    </div>

    <!-- Imports de scripts JavaScript necessários para os comportamentos popup dos controles -->
    $jsImports
</body>
</html>
