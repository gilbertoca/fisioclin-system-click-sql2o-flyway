<div class="pure-g">
    <div class="pure-u-1" style="background: #ffffff; padding: 2.5em; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">

        #if($modoFormulario)
            <!-- MODO FORMULÁRIO DE CADASTRO -->
            <h3 style="color: #1f8dd6; margin-top: 0; font-size: 1.6em;">Novo Agendamento</h3>
            <p style="color: #7f8c8d; margin-bottom: 2em;">Insira os dados operacionais da sessão clínica.</p>
            
            <div class="pure-form">
                $formAgendamento
            </div>
        #else
            <!-- MODO GRADE DE AGENDA DIÁRIA -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2em;">
                <div>
                    <h3 style="color: #1f8dd6; margin-top: 0; font-size: 1.6em; margin-bottom: 0.2em;">Agenda Operacional</h3>
                    <p style="color: #7f8c8d; margin: 0;">Grade de atendimentos programados para o dia de hoje.</p>
                </div>
                <div>
                    $linkNovo
                </div>
            </div>

            <div style="overflow-x: auto;">
                $tabelaAgenda
            </div>
        #end

    </div>
</div>
